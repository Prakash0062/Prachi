<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holi Surprise</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
    background-image: url('Untitled.jpeg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-blend-mode: overlay;
    animation: gradientBG 10s ease infinite;
    overflow:hidden;
}

/* Background Animation */
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Center Card */
.container{
    text-align:center;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:#ff4081;
    color:white;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* Hidden Text Section */
.message{
    display:none;
    font-size:40px;
    color:white;
    text-shadow:2px 2px 10px rgba(0,0,0,0.3);
    animation: fadeIn 2s ease forwards;
}

.subtext{
    font-size:22px;
    margin-top:15px;
    opacity:0;
    animation: fadeIn 3s ease forwards;
    animation-delay:1s;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* Color Splash Effect */
.splash{
    position:absolute;
    width:15px;
    height:15px;
    border-radius:50%;
    background:yellow;
    animation: splashAnim 4s linear infinite;
}

@keyframes splashAnim{
    0%{transform:translateY(0) scale(1);}
    100%{transform:translateY(100vh) scale(0);}
}
</style>
</head>
<body>

<div class="container">
    <button onclick="showSurprise()">Surprise 🎁</button>

    <div class="message" id="msg">
        Happy Holi Prachi💖
        <div class="subtext"></div>
    </div>
</div>

<audio id="music" src="rang.mp3" preload="auto"></audio>

<script>
function showSurprise(){
    document.querySelector("button").style.display="none";
    document.getElementById("msg").style.display="block";

    // Play Music
    document.getElementById("music").play();

    // Create color splashes
    for(let i=0;i<40;i++){
        let splash=document.createElement("div");
        splash.classList.add("splash");
        splash.style.left=Math.random()*100+"vw";
        splash.style.background=
            "hsl(" + Math.random()*360 + ", 100%, 60%)";
        splash.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(splash);
    }
}
</script>

</body>

</html>
